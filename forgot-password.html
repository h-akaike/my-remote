<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<title>パスワード再設定 - MyRemo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#f7f9fb] text-[#2c3437] min-h-screen flex items-center justify-center p-4" style="font-family:'Plus Jakarta Sans',sans-serif">
<main class="w-full max-w-[480px] bg-white rounded-3xl p-8 md:p-12 shadow-[0_20px_40px_rgba(44,52,55,0.06)]">
<a href="index.html" class="text-center text-3xl font-extrabold text-[#11639e] mb-3 inline-flex items-center justify-center gap-2 w-full" style="font-family:Manrope,sans-serif" aria-label="MyRemo"><img src="assets/favicon-180.png" alt="" class="h-8 w-8 rounded-lg shrink-0"><span>MyRemo</span></a>
<h1 class="text-2xl font-bold text-center mb-3">パスワード再設定</h1>
<p class="text-sm text-[#596064] text-center mb-8">登録済みのメールアドレスに再設定リンクを送ります。</p>
<div id="message" class="hidden mb-6 rounded-xl px-4 py-3 text-sm font-medium"></div>
<form id="reset-form" class="space-y-5">
<label class="block text-sm font-semibold text-[#4b6274]" for="email">メールアドレス</label>
<input id="email" name="email" type="email" required class="w-full px-4 py-4 bg-[#e3e9ed] border-none rounded-xl focus:ring-2 focus:ring-[#11639e]/20" placeholder="example@myremo.jp"/>
<button type="submit" class="w-full py-4 rounded-xl bg-[#11639e] text-white font-bold">再設定メールを送る</button>
</form>
<p class="text-center mt-8 text-sm"><a href="login.html" class="text-[#11639e] font-bold">ログインに戻る</a></p>
</main>
<script src="assets/js/myremote-auth.js"></script>
<script>
const form = document.getElementById('reset-form');
const message = document.getElementById('message');
form.addEventListener('submit', async (event) => {
  event.preventDefault();
  const button = form.querySelector('button');
  button.disabled = true;
  try {
    const result = await window.myremoteAuth.passwordReset(document.getElementById('email').value);
    message.textContent = result.message || 'メールを送信しました。';
    message.className = 'mb-6 rounded-xl px-4 py-3 text-sm font-medium bg-[#11639e]/10 text-[#11639e]';
  } catch (error) {
    message.textContent = error.message;
    message.className = 'mb-6 rounded-xl px-4 py-3 text-sm font-medium bg-red-50 text-red-700';
  } finally {
    button.disabled = false;
  }
});
</script>
</body></html>
