<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<title>マイページ - MyRemo</title>
<script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-slate-50 text-slate-800">
<header class="h-20 bg-white border-b border-slate-200"><nav class="max-w-5xl mx-auto h-full px-6 flex items-center justify-between"><a href="index.html" class="font-black text-2xl text-blue-700">MyRemo</a><div class="flex gap-5 text-sm font-semibold"><a href="jobs.html">お仕事を探す</a><a href="#logout" id="logout">ログアウト</a></div></nav></header>
<main class="max-w-5xl mx-auto px-6 py-12">
<h1 class="text-4xl font-black mb-8">マイページ</h1>
<section class="grid md:grid-cols-[320px,1fr] gap-8">
<div class="bg-white rounded-2xl p-6 shadow-sm"><h2 class="font-bold text-xl mb-4">会員情報</h2><div id="profile" class="space-y-2 text-sm text-slate-600">読み込み中...</div></div>
<div class="bg-white rounded-2xl p-6 shadow-sm"><h2 class="font-bold text-xl mb-4">応募履歴</h2><div id="applications" class="space-y-3 text-sm text-slate-600">読み込み中...</div></div>
</section>
</main>
<script src="assets/js/myremote-auth.js"></script>
<script>
const profile = document.getElementById('profile');
const applications = document.getElementById('applications');
const escapeHtml = (value) => String(value || '').replace(/[&<>"']/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));

async function loadMypage() {
  if (!window.myremoteAuth.getToken()) {
    window.location.href = 'login.html?next=mypage.html';
    return;
  }

  try {
    const user = await window.myremoteAuth.me();
    profile.innerHTML = `
      <p><strong>氏名:</strong> ${escapeHtml(user.last_name)} ${escapeHtml(user.first_name)}</p>
      <p><strong>メール:</strong> ${escapeHtml(user.email)}</p>
      <p><strong>電話:</strong> ${escapeHtml(user.phone || '-')}</p>
    `;
    const data = await fetch('https://enn-musubi.sakura.ne.jp/my-remote/wp-json/myremote/v1/applications', {
      headers: { Authorization: 'Bearer ' + window.myremoteAuth.getToken() },
    }).then((res) => res.json());
    const items = data.applications || [];
    applications.innerHTML = items.length ? items.map((item) => `
      <div class="rounded-xl bg-slate-50 p-4">
        <p class="font-bold text-slate-800">${escapeHtml(item.job_title)}</p>
        <p>応募日: ${new Date(item.created_at).toLocaleDateString('ja-JP')}</p>
        <p>ステータス: ${escapeHtml(item.status || 'new')}</p>
      </div>
    `).join('') : '応募履歴はまだありません。';
  } catch (error) {
    window.myremoteAuth.clearSession();
    window.location.href = 'login.html?next=mypage.html';
  }
}

document.getElementById('logout').addEventListener('click', async (event) => {
  event.preventDefault();
  await window.myremoteAuth.logout();
  window.location.href = 'login.html';
});
loadMypage();
</script>
</body></html>
