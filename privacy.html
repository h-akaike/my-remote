<main class="max-w-3xl mx-auto px-6 py-16">

<h1 class="text-4xl font-black mt-8 mb-6">プライバシーポリシー</h1>
<div class="bg-white rounded-2xl p-8 space-y-6 leading-8 shadow-sm">
<p>MyRemoは、求人応募・会員登録・お問い合わせに必要な範囲で個人情報を取得し、求人紹介、応募管理、本人確認、連絡対応のために利用します。</p>
<p>取得する情報には、氏名、メールアドレス、電話番号、生年月日、職務経験、応募内容、履歴書等のファイルが含まれます。</p>
<p>法令に基づく場合を除き、本人の同意なく第三者へ個人情報を提供しません。業務委託先に取り扱いを委託する場合は、適切な管理を行います。</p>
<p>個人情報の開示、訂正、削除等を希望される場合は、お問い合わせページよりご連絡ください。</p>
</div>
</main>
<script src="assets/js/myremote-auth.js"></script>
